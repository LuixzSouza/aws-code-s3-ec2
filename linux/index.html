<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux EC2 | Luiz Souza</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top right, #1e293b, #0f172a);
    color: #f8fafc;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    background: rgba(30, 41, 59, 0.7);
    padding: 35px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    /* Destaque com a cor clássica do Ubuntu */
    border-top: 4px solid #E95420; 
    backdrop-filter: blur(20px);
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
  }

  .icon-box {
    background: rgba(233, 84, 32, 0.1);
    padding: 12px;
    border-radius: 12px;
    color: #E95420;
  }

  .icon-box svg {
    width: 28px;
    height: 28px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #f8fafc;
  }

  .subtitle {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 400;
  }

  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 25px;
  }

  .detail-item {
    background: rgba(0, 0, 0, 0.2);
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .detail-label {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .detail-value {
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
  }

  .status-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    border-radius: 8px;
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.2);
    color: #4ade80;
    font-size: 14px;
    font-weight: 500;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background-color: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
  }

  .footer {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 12px;
    color: #64748b;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer b {
    color: #e2e8f0;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z" />
      </svg>
    </div>
    <div>
      <h1>Linux Server</h1>
      <div class="subtitle">Amazon EC2 Instance</div>
    </div>
  </div>

  <div class="details-grid">
    <div class="detail-item">
      <div class="detail-label">Instance Type</div>
      <div class="detail-value">t3.micro</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">OS Info</div>
      <div class="detail-value">Ubuntu 22.04 LTS</div>
    </div>
  </div>

  <div class="status-badge">
    <div class="status-dot"></div>
    Deploy realizado com sucesso
  </div>

  <div class="footer">
    <span>Infraestrutura AWS</span>
    <span>Por <b>Luiz Souza</b></span>
  </div>
</div>

</body>
</html>
