<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AWS Server | Deploy Ativo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 600px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fade 1s ease;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34,197,94,0.15);
      color: #22c55e;
      font-size: 12px;
      border: 1px solid rgba(34,197,94,0.4);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 15px;
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-3px);
      border-color: #38bdf8;
    }

    .label {
      font-size: 12px;
      color: #64748b;
    }

    .value {
      font-size: 16px;
      margin-top: 5px;
      font-weight: 500;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pulse {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 10px #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1;}
      100% { transform: scale(1.8); opacity: 0;}
    }

  </style>
</head>

<body>

  <div class="card">
    
    <div class="top">
      <div class="badge">AWS EC2 - RUNNING</div>
      <div class="pulse"></div>
    </div>

    <h1>Deploy realizado com sucesso 🚀</h1>
    <p>Servidor Windows rodando na AWS EC2 com aplicação web ativa.</p>

    <div class="grid">
      <div class="box">
        <div class="label">Status</div>
        <div class="value">Online</div>
      </div>

      <div class="box">
        <div class="label">Região</div>
        <div class="value">us-east-1</div>
      </div>

      <div class="box">
        <div class="label">Horário</div>
        <div class="value" id="time">--:--:--</div>
      </div>

      <div class="box">
        <div class="label">Servidor</div>
        <div class="value">Windows Server</div>
      </div>
    </div>

    <div class="footer">
      Desenvolvido por Luiz • Projeto AWS EC2
    </div>

  </div>

  <script>
    function updateTime() {
      const now = new Date();
      document.getElementById('time').innerText =
        now.toLocaleTimeString('pt-BR');
    }

    setInterval(updateTime, 1000);
    updateTime();
  </script>

</body>
</html>
