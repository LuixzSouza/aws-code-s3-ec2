<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Servidor AWS Ativo 🚀</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    p {
      font-size: 1rem;
      color: #cbd5f5;
      margin-bottom: 25px;
    }

    .status {
      display: inline-block;
      padding: 10px 20px;
      background: #22c55e;
      border-radius: 999px;
      font-weight: bold;
      box-shadow: 0 0 15px rgba(34,197,94,0.6);
    }

    .footer {
      margin-top: 25px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glow {
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #38bdf8;
      }
      to {
        text-shadow: 0 0 25px #38bdf8;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="glow">Servidor Online 🚀</h1>
    <p>Este site está sendo servido diretamente de uma instância EC2 na AWS.</p>

    <div class="status">✔ Deploy realizado com sucesso</div>

    <div class="footer">
      Projeto acadêmico - AWS EC2 + Windows Server
    </div>
  </div>
</body>
</html>
