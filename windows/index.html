<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows EC2 | Luiz Souza</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    /* Fundo escuro moderno, lembrando painéis cloud */
    background: radial-gradient(circle at top right, #1e293b, #0f172a);
    color: #f8fafc;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    background: rgba(30, 41, 59, 0.7);
    padding: 35px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 4px solid #ff9900; /* Destaque laranja AWS */
    backdrop-filter: blur(20px);
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
  }

  .icon-box {
    background: rgba(255, 153, 0, 0.1);
    padding: 12px;
    border-radius: 12px;
    color: #ff9900;
  }

  .icon-box svg {
    width: 28px;
    height: 28px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #f8fafc;
  }

  .subtitle {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 400;
  }

  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 25px;
  }

  .detail-item {
    background: rgba(0, 0, 0, 0.2);
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .detail-label {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .detail-value {
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
  }

  .status-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    border-radius: 8px;
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.2);
    color: #4ade80;
    font-size: 14px;
    font-weight: 500;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background-color: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
  }

  .footer {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 12px;
    color: #64748b;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer b {
    color: #e2e8f0;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3m3 3a3 3 0 1 0 0 6h13.5a3 3 0 1 0 0-6m-16.5-3a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3m-19.5 0a4.5 4.5 0 0 1 .9-2.7L5.737 5.1a3.375 3.375 0 0 1 2.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 0 1 .9 2.7m0 0a3 3 0 0 1-3 3m0 3h.008v.008h-.008v-.008Zm0-6h.008v.008h-.008v-.008Zm-3 6h.008v.008h-.008v-.008Zm0-6h.008v.008h-.008v-.008Z" />
      </svg>
    </div>
    <div>
      <h1>Windows Server</h1>
      <div class="subtitle">Amazon EC2 Instance</div>
    </div>
  </div>

  <div class="details-grid">
    <div class="detail-item">
      <div class="detail-label">Instance Type</div>
      <div class="detail-value">t3.medium</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">Region</div>
      <div class="detail-value">sa-east-1</div>
    </div>
  </div>

  <div class="status-badge">
    <div class="status-dot"></div>
    Deploy realizado com sucesso
  </div>

  <div class="footer">
    <span>Infraestrutura AWS</span>
    <span>Por <b>Luiz Souza</b></span>
  </div>
</div>

</body>
</html>
